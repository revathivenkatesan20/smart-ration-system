spring.application.name=smart-ration-system
server.port=${PORT:8080}

# Database Configuration (All via environment variables - set these on Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Configuration (All via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS: comma-separated list; includes Vercel prod and local Capacitor
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://your-app.vercel.app,capacitor://localhost,http://localhost}

# External Services (All via environment variables)
ai.module.url=${AI_MODULE_URL:https://smart-ration-ai.onrender.com}

# OTP: Set to false in production via env variables
otp.debug.mode=${OTP_DEBUG_MODE:false}
msg91.auth.key=${MSG91_AUTH_KEY}
msg91.sender.id=${MSG91_SENDER_ID:SMART}
msg91.template.id=${MSG91_TEMPLATE_ID}

# Logging: suppress verbose security logs in production
logging.level.com.ration=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN